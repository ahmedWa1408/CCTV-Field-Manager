<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بيانات الخطة</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Cairo',sans-serif;

}

body{

background:#eef2f8;

min-height:100vh;

}

.header{

background:linear-gradient(135deg,#44d4ff,#5a73ff,#7b3ff2);

padding:55px 20px;

text-align:center;

border-bottom-left-radius:35px;

border-bottom-right-radius:35px;

box-shadow:0 10px 35px rgba(0,0,0,.15);

}

.header h1{

font-size:44px;

font-weight:800;

color:#fff;

}

.header h2{

margin-top:10px;

font-size:22px;

font-weight:600;

color:#eef7ff;

}

.card{

width:92%;

max-width:500px;

margin:35px auto;

background:#fff;

border-radius:30px;

padding:35px;

box-shadow:0 20px 45px rgba(0,0,0,.12);

}

.title{

text-align:center;

font-size:36px;

font-weight:800;

color:#6b2bd8;

margin-bottom:35px;

}

label{

display:block;

text-align:center;

font-size:24px;

font-weight:700;

margin-bottom:18px;

color:#444;

}input{

width:100%;

height:78px;

border:2px solid #d8e1ee;

border-radius:18px;

outline:none;

text-align:center;

font-size:44px;

font-weight:800;

letter-spacing:2px;

background:#ffffff;

background-image:linear-gradient(90deg,#44d4ff,#5a73ff,#7b3ff2);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

caret-color:#5a73ff;

transition:.30s;

}

input:focus{

border-color:#5a73ff;

box-shadow:0 0 0 5px rgba(90,115,255,.15);

transform:scale(1.02);

}

button{

width:100%;

height:65px;

margin-top:30px;

border:none;

border-radius:18px;

font-size:24px;

font-weight:800;

cursor:pointer;

color:#fff;

background:linear-gradient(135deg,#44d4ff,#5a73ff,#7b3ff2);

box-shadow:0 12px 30px rgba(90,115,255,.30);

transition:.30s;

}

button:hover{

transform:translateY(-3px);

}

.error{

margin-top:18px;

text-align:center;

color:#e53935;

font-size:18px;

font-weight:700;

min-height:25px;

}

</style>

</head>

<body>

<div class="header">

<h1>الحركة الميدانية</h1>

<h2>قسم التشغيل CCTV</h2>

</div>

<div class="card">

<div class="title">

بيانات الخطة

</div>

<label>

رقم الخطة

</label>

<input

id="planNumber"

type="number"

min="1"

max="6"

placeholder="1">

<button

onclick="searchPlan()">

بحث

</button>

<div

id="error"

class="error">

</div>

</div>

<script src="plans.js"></script>

<script src="plan.js"></script>

</body>

</html>
