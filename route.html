<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المسار</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#43d4ff,#5b72ff,#7b3ff2);

}

.card{

width:92%;

max-width:500px;

background:white;

padding:40px;

border-radius:30px;

box-shadow:0 20px 50px rgba(0,0,0,.15);

text-align:center;

}

.routeNumber{

font-size:42px;

font-weight:800;

background:linear-gradient(90deg,#43d4ff,#5b72ff,#7b3ff2);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:15px;

}

.routeName{

font-size:32px;

font-weight:700;

color:#555;

margin-bottom:35px;

}button{

width:100%;

height:62px;

border:none;

border-radius:18px;

margin-top:18px;

font-size:22px;

font-weight:800;

cursor:pointer;

transition:.30s;

}

#start{

background:linear-gradient(135deg,#43d4ff,#5b72ff,#7b3ff2);

color:white;

}

#history{

background:#27ae60;

color:white;

}

#back{

background:#ecf0f1;

color:#555;

}

button:hover{

transform:translateY(-3px);

}

</style>

</head>

<body>

<div class="card">

<div
class="routeNumber"
id="routeNumber">
</div>

<div
class="routeName"
id="routeName">
</div>

<button
id="start">

🚀 بدء المسار

</button>

<button
id="history">

📋 سجلات المسار السابقة

</button>

<button
id="back">

⬅ العودة

</button>

</div>

<script>

const routeNumber =
localStorage.getItem("routeNumber");

const routeName =
localStorage.getItem("routeName");

document.getElementById("routeNumber").innerHTML =
routeNumber;

document.getElementById("routeName").innerHTML =
routeName;

document.getElementById("back").onclick=function(){

location.href="plan.html";

};

document.getElementById("start").onclick=function(){

location.href="mission.html";

};

document.getElementById("history").onclick=function(){

location.href="history.html";

};

</script>

</body>

</html>
