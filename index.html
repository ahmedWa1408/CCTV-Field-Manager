<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية CCTV</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Cairo',sans-serif;

}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,
#43d4ff,
#5b72ff,
#7b3ff2);

overflow:hidden;

}

.card{

width:92%;

max-width:480px;

background:#ffffff;

border-radius:35px;

padding:45px 30px;

text-align:center;

box-shadow:
0 25px 60px rgba(0,0,0,.18);

animation:
cardShow
1s ease;

}

h1{

font-size:42px;

font-weight:800;

background:
linear-gradient(
90deg,
#43d4ff,
#5b72ff,
#7b3ff2);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:25px;

}

p{

font-size:22px;

line-height:2;

color:#666;

margin-bottom:40px;

}

button{

width:100%;

height:65px;

border:none;

border-radius:18px;

font-size:24px;

font-weight:800;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#43d4ff,
#5b72ff,
#7b3ff2);

transition:.30s;

box-shadow:
0 12px 30px
rgba(91,114,255,.30);

}

button:hover{

transform:translateY(-3px);

}button:active{

transform:scale(.98);

}

@keyframes cardShow{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card">

<h1>

مرحباً بكم

</h1>

<p>

نسأل الله لكم التوفيق والسلامة
<br>
في أداء مهامكم الميدانية

</p>

<button onclick="startApp()">

ابدأ

</button>

</div>

<script>

function startApp(){

window.location.href="plan.html";

}

</script>

</body>

</html>
